replicaCount: 1

image:
  repository: ghcr.io/dclawstack/dclaw-policy
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8126

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: policy.dclawstack.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

postgresql:
  enabled: true
  persistence:
    size: 10Gi

serviceAccount:
  create: true
  annotations: {}
  name: ""
